name: CodeTitan Security Scan

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  codetitan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore CodeTitan runtime cache
        uses: actions/cache@v4
        with:
          path: .codetitan-action-runtime
          key: ${{ runner.os }}-codetitan-${{ hashFiles('.github/workflows/codetitan-sarif-demo.yml') }}

      - name: Run CodeTitan
        id: codetitan
        uses: Noa-Lia/codetitan-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path: .
          fail-on-severity: CRITICAL
          format: both
          runtime-root: .codetitan-action-runtime
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload CodeTitan report
        uses: actions/upload-artifact@v4
        with:
          name: codetitan-report
          path: |
            ${{ steps.codetitan.outputs.report-path }}
            ${{ steps.codetitan.outputs.sarif-path }}

      - name: Upload SARIF to GitHub code scanning
        if: steps.codetitan.outputs.sarif-path != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.codetitan.outputs.sarif-path }}
