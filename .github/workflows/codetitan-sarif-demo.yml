name: CodeTitan SARIF Demo

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  codetitan-sarif:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate CodeTitan demo SARIF
        run: node generate-sarif.mjs

      - name: Upload SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: codetitan-report.sarif
